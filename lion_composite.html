<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 628px; overflow: hidden; }
  .container {
    width: 1200px;
    height: 628px;
    position: relative;
    overflow: hidden;
  }
  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.7) 45%, rgba(0,0,0,0.15) 75%, transparent 100%);
  }
  .text-content {
    position: absolute;
    top: 0; left: 0;
    width: 55%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 50px 60px;
    z-index: 2;
  }
  .quote {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 36px;
    font-weight: bold;
    color: #fff;
    line-height: 1.35;
    margin-bottom: 24px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .quote .highlight {
    color: #f5a623;
  }
  .divider {
    width: 80px;
    height: 4px;
    background: #f5a623;
    margin-bottom: 20px;
    border-radius: 2px;
  }
  .tagline {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 18px;
    color: #ccc;
    font-style: italic;
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .badge {
    position: absolute;
    bottom: 30px;
    left: 60px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="container">
  <img class="bg-image" src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=1200&h=628&fit=crop&crop=faces" alt="Lion" />
  <div class="overlay"></div>
  <div class="text-content">
    <div class="quote">
      If your demo can't survive <span class="highlight">chaos</span>,<br>
      it's not a demo.<br><br>
      It's a <span class="highlight">performance</span>.
    </div>
    <div class="divider"></div>
    <div class="tagline">
      The Wild Animal Test for AI
    </div>
  </div>
  <div class="badge">Photo: Rob Potter / Unsplash</div>
</div>
</body>
</html>
